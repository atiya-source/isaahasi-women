<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d0010;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: drift 10s ease-in-out infinite alternate; }
  .orb1 { width: 400px; height: 400px; background: #7b2d8b; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: #c2185b; top: 50%; right: -80px; animation-delay: -3s; }
  .orb3 { width: 350px; height: 350px; background: #4a1050; bottom: -80px; left: 30%; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

  .card {
    position: relative; z-index: 1;
    width: min(700px, 95vw);
    background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    animation: cardIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn { from { opacity:0; transform: translateY(60px) scale(0.95); } to { opacity:1; transform: none; } }

  .ribbon {
    background: linear-gradient(90deg, #7b2d8b, #c2185b, #e91e8c, #c2185b, #7b2d8b);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
    height: 4px;
  }
  @keyframes shimmer { from { background-position: 0% 0%; } to { background-position: 200% 0%; } }

  .header { padding: 32px 40px 20px; text-align: center; }
  .date-tag {
    display: inline-block; font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: #e91e8c; border: 1px solid rgba(233,30,140,0.4); padding: 4px 16px;
    border-radius: 20px; margin-bottom: 16px; animation: fadeUp 1s 0.3s both;
  }
  .main-title {
    font-family: 'Playfair Display', serif; font-size: clamp(2.4rem,6vw,3.8rem);
    font-weight: 700; color: #fff; line-height: 1.1; animation: fadeUp 1s 0.5s both;
  }
  .main-title em {
    font-style: italic;
    background: linear-gradient(90deg, #e91e8c, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { margin-top: 10px; font-size: 1.05rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; font-weight: 300; animation: fadeUp 1s 0.7s both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }

  .photo-wrap { position: relative; margin: 0 28px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: fadeUp 1s 0.9s both; }
  .photo-wrap img { width: 100%; display: block; max-height: 380px; object-fit: cover; object-position: center top; }
  .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,0,16,0.65) 0%, transparent 50%); }
  .photo-caption { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.9); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; }

  .flowers { display: flex; justify-content: center; gap: 8px; padding: 18px 0 4px; font-size: 1.4rem; animation: fadeUp 1s 1.1s both; }
  .flowers span { animation: float 3s ease-in-out infinite; }
  .flowers span:nth-child(2) { animation-delay: 0.3s; }
  .flowers span:nth-child(3) { animation-delay: 0.6s; }
  .flowers span:nth-child(4) { animation-delay: 0.9s; }
  .flowers span:nth-child(5) { animation-delay: 1.2s; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .quote-section { padding: 16px 40px 24px; text-align: center; animation: fadeUp 1s 1.2s both; }
  .quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem,2.5vw,1.15rem); color: rgba(255,255,255,0.75); line-height: 1.7; }
  .quote-author { margin-top: 8px; font-size: 0.8rem; letter-spacing: 3px; color: #e91e8c; text-transform: uppercase; }

  /* Music Player */
  .music-player {
    margin: 0 28px 28px;
    padding: 16px 20px;
    background: rgba(233,30,140,0.08);
    border: 1px solid rgba(233,30,140,0.25);
    border-radius: 16px;
    animation: fadeUp 1s 1.3s both;
  }
  .music-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .music-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #7b2d8b, #e91e8c);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
    animation: spin 4s linear infinite paused;
  }
  .music-icon.playing { animation-play-state: running; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .music-info { flex: 1; }
  .music-title { color: #fff; font-size: 0.95rem; font-weight: 600; font-family: 'Playfair Display', serif; }
  .music-subtitle { color: rgba(255,255,255,0.45); font-size: 0.75rem; letter-spacing: 1px; margin-top: 2px; }

  .controls { display: flex; align-items: center; gap: 12px; }
  .play-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #c2185b, #e91e8c);
    border: none; cursor: pointer; color: #fff; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(233,30,140,0.4);
    transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0;
  }
  .play-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(233,30,140,0.6); }

  .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .progress-bar-bg {
    width: 100%; height: 4px; background: rgba(255,255,255,0.15);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #c2185b, #e91e8c);
    border-radius: 2px; width: 0%; transition: width 0.1s linear;
    position: relative;
  }
  .progress-bar-fill::after {
    content: ''; position: absolute; right: -4px; top: -3px;
    width: 10px; height: 10px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 6px rgba(233,30,140,0.8);
  }
  .time-row { display: flex; justify-content: space-between; color: rgba(255,255,255,0.4); font-size: 0.7rem; }

  /* Tap to start overlay */
  .tap-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(13,0,16,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; cursor: pointer;
    animation: fadeIn 0.5s both;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .tap-overlay .tap-icon { font-size: 3rem; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .tap-overlay h2 { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.8rem; text-align: center; }
  .tap-overlay p { color: rgba(255,255,255,0.5); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
  .tap-overlay .tap-btn {
    margin-top: 8px; padding: 12px 36px; border-radius: 40px;
    background: linear-gradient(135deg, #7b2d8b, #e91e8c);
    border: none; color: #fff; font-size: 1rem; font-family: 'Cormorant Garamond', serif;
    letter-spacing: 2px; cursor: pointer; box-shadow: 0 8px 30px rgba(233,30,140,0.4);
    transition: transform 0.2s;
  }
  .tap-overlay .tap-btn:hover { transform: scale(1.05); }

  .petal { position: fixed; pointer-events: none; animation: petalFall linear infinite; opacity: 0; z-index: 0; }
  @keyframes petalFall { 0% { transform: translateY(-20px) rotate(0deg); opacity:0; } 10% { opacity:0.6; } 90% { opacity:0.4; } 100% { transform: translateY(110vh) rotate(720deg); opacity:0; } }
</style>
</head>

  <button class="tap-btn">Open Card 💜</button>
</div>

          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <div class="ribbon" style="animation-direction: reverse;"></div>
</div>

<audio id="bgAudio" preload="auto">
  <source src="audio.mp3" type="audio/mp3">
</audio>

<script>
  const audio = document.getElementById('bgAudio');
  // Gracefully hide player if audio file not found
  audio.addEventListener('error', () => {
    const player = document.querySelector('.audio-player');
    if (player) player.style.display = 'none';
    const overlay = document.getElementById('tapOverlay');
    if (overlay) overlay.style.display = 'none';
  });
  const playBtn = document.getElementById('playBtn');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const discIcon = document.getElementById('discIcon');

  function fmt(s) {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }

  function startExperience() {
    document.getElementById('tapOverlay').style.display = 'none';
    audio.play().catch(()=>{}).catch(()=>{});
    playBtn.textContent = '⏸';
    discIcon.classList.add('playing');
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play().catch(()=>{});
      playBtn.textContent = '⏸';
      discIcon.classList.add('playing');
    } else {
      audio.pause();
      playBtn.textContent = '▶';
      discIcon.classList.remove('playing');
    }
  }

  function seekAudio(e) {
    const rect = document.getElementById('progressBg').getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = fmt(audio.currentTime);
      totalTimeEl.textContent = fmt(audio.duration);
    }
  });

  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    discIcon.classList.remove('playing');
    progressFill.style.width = '0%';
  });

  // Floating petals
  const emojis = ['🌸','🌺','💜','✨','🌷'];
  for(let i=0; i<15; i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (6+Math.random()*8)+'s';
    p.style.animationDelay = (Math.random()*8)+'s';
    p.style.fontSize = (0.8+Math.random()*0.8)+'rem';
    document.body.appendChild(p);
  }
</script>
</body>
</html>
